<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBotAlpha | Your AI Companion</title>
  <meta name="description" content="ChatBotAlpha - An AI chatbot powered by Gemini that answers your questions and keeps the conversation flowing.">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🤖</span>
        <h1>ChatBotAlpha</h1>
      </div>
      <button class="clear-btn" id="clearBtn" title="Clear chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <span>Clear</span>
      </button>
    </header>

    <div class="chat-container" id="chatContainer">
      <div class="welcome-message" id="welcomeMessage">
        <div class="welcome-icon">🤖</div>
        <h2>Hello! I'm ChatBotAlpha</h2>
        <p>Ask me anything! I'll answer and keep our conversation going with a follow-up question.</p>
        <div class="quick-prompts">
          <button class="prompt-btn" data-prompt="What's the best way to stay motivated?">Stay motivated</button>
          <button class="prompt-btn" data-prompt="Tell me something interesting about space">Space facts</button>
          <button class="prompt-btn" data-prompt="How can I be more productive?">Be productive</button>
          <button class="prompt-btn" data-prompt="What's a good book to read?">Book recommendation</button>
        </div>
      </div>
      <div class="messages" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
